on:
    push:
        tags:
            - 'publish@*' # e.g. publish@0.168.10002

name: Create Release

permissions:
    contents: write
    id-token: write

jobs:
    release:
        name: Create Release & Publish to npm
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        environment: npm-publish
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'
            - name: Publish to npm
              run: cd types/three && npm publish --provenance --access public
            - name: Pack
              run: cd types/three && npm pack | xargs -I {} mv {} ../../package.tgz
            - name: Create GitHub Release
              uses: ncipollo/release-action@v1
              with:
                  artifacts: package.tgz
